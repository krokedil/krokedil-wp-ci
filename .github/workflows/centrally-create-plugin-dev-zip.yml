# Centrally Create Plugin Dev Zip
#
# Builds a dev zip for a plugin repo using this repo's secrets.
# Use this when the plugin repo itself doesn't have AWS S3 or Slack secrets,
# or select "dummy-plugin-for-repo-tests" to test the workflow itself.
#
# Inputs: plugin repo (dropdown), branch/SHA, AWS upload toggle, PHP versions.
# Checkout: external plugin at root, CI helpers at .github/krokedil-wp-ci.
# GITHUB_REF_NAME/GITHUB_SHA are overridden to reflect the external repo.

name: Centrally Create Plugin Dev Zip
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      plugin_repo:
        required: true
        type: choice
        description: "Plugin repository to build (dummy-plugin-for-repo-tests tests the workflow itself)."
        options:
          # --- BEGIN GENERATED PLUGIN OPTIONS ---
          - Budbee for WooCommerce
          - Klarna Payments for WooCommerce
          - Kustom Checkout for WooCommerce
          - Swedbank Pay WooCommerce Payment Menu
          - dummy-plugin-for-repo-tests
          # --- END GENERATED PLUGIN OPTIONS ---
      ref:
        required: false
        type: string
        default: "main"
        description: "Branch, tag, or commit SHA to check out from the plugin repo."
      aws_upload:
        required: false
        type: boolean
        default: true
        description: "Upload dev zip to AWS S3."
      test_php_versions:
        required: false
        type: string
        default: "8.3"
        description: "PHP versions for e2e testing: 8.4,8.3,8.2,8.1,8.0,7.4 (comma-separated) or 'all'."

jobs:
  create_plugin_dev_zip:
    runs-on: ubuntu-latest
    outputs:
      zip_file_name: ${{ steps.build.outputs.zip_file_name }}
      aws_s3_public_url: ${{ steps.upload.outputs.aws_s3_public_url }}
    steps:
      - name: Build plugin
        id: build
        uses: ./.github/actions/centrally-build-plugin
        with:
          plugin_repo: ${{ inputs.plugin_repo }}
          ref: ${{ inputs.ref }}
          classic_personal_access_token: ${{ secrets.CLASSIC_PERSONAL_ACCESS_TOKEN }}
          upload_artifact: "true"

      - name: Configure AWS credentials (optional)
        if: ${{ always() }}
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_KROKEDIL_PLUGIN_DEV_ZIP }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_KROKEDIL_PLUGIN_DEV_ZIP }}
          aws-region: eu-north-1

      - name: Upload to S3 (optional)
        id: upload
        if: inputs.aws_upload == true
        env:
          PLUGIN_SLUG: ${{ steps.build.outputs.plugin_slug }}
          ZIP_FILE_NAME: ${{ steps.build.outputs.zip_file_name }}
        run: bash .github/krokedil-wp-ci/scripts/upload-zip-aws-s3.sh

      - name: Install test dependencies
        working-directory: .github/krokedil-wp-ci/tests/plugin-dev-zip
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('.github/krokedil-wp-ci/tests/plugin-dev-zip/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: .github/krokedil-wp-ci/tests/plugin-dev-zip
        run: npx playwright install --with-deps

      - name: Cache Playground snapshots
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: .github/krokedil-wp-ci/tests/plugin-dev-zip/playground-snapshots
          key: playground-${{ runner.os }}-${{ hashFiles('zipfile/**', '.github/krokedil-wp-ci/scripts/lib/blueprint/**') }}
          restore-keys: |
            playground-${{ runner.os }}-

      - name: Run shared e2e tests (Playwright)
        working-directory: .github/krokedil-wp-ci/tests/plugin-dev-zip
        env:
          E2E_AUTO_MOUNT: ${{ github.workspace }}/zipfile/${{ steps.build.outputs.plugin_slug }}
          PLUGIN_META_JSON: ${{ steps.build.outputs.plugin_meta_json }}
          KROKEDIL_TEST_PHP_VERSIONS: ${{ inputs.test_php_versions }}
        run: |
          npm run clean:e2e
          npx playwright test --config=end-to-end/playwright.config.ts

      - name: Upload Playwright test reports
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-test-reports-${{ steps.build.outputs.zip_file_name }}
          path: .github/krokedil-wp-ci/tests/plugin-dev-zip/test-results/end-to-end
          retention-days: 7

      - name: Upload Playwright HTML report to S3
        if: ${{ always() }}
        id: upload_playwright_report
        env:
          PLAYWRIGHT_REPORT_DIR: .github/krokedil-wp-ci/tests/plugin-dev-zip/test-results/end-to-end/html-report
        run: bash .github/krokedil-wp-ci/scripts/upload-playwright-report-aws-s3.sh

      - name: Create job summary
        if: ${{ always() }}
        id: summary
        env:
          PLUGIN_META_JSON: ${{ steps.build.outputs.plugin_meta_json }}
          ZIP_FILE_NAME: ${{ steps.build.outputs.zip_file_name }}
          AWS_S3_PUBLIC_URL: ${{ steps.upload.outputs.aws_s3_public_url }}
          PLAYWRIGHT_REPORT_URL: ${{ steps.upload_playwright_report.outputs.playwright_report_url }}
        run: node .github/krokedil-wp-ci/scripts/job-summary-create-plugin-dev-zip.js

      - name: Send Slack notification
        if: ${{ always() }}
        env:
          PLUGIN_META_JSON: ${{ steps.build.outputs.plugin_meta_json }}
          ZIP_FILE_NAME: ${{ steps.build.outputs.zip_file_name }}
          AWS_S3_PUBLIC_URL: ${{ steps.upload.outputs.aws_s3_public_url }}
          PLAYWRIGHT_REPORT_URL: ${{ steps.upload_playwright_report.outputs.playwright_report_url }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_KROKEDIL_E2E_NOTIFICATIONS }}
        run: node .github/krokedil-wp-ci/scripts/slack-notify-create-plugin-dev-zip.js
