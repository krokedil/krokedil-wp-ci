name: "Test: Deploy to InstaWP"
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      instawp_url:
        required: false
        type: string
        default: ""
        description: "InstaWP site URL to deploy to an existing site (tests the existing-site workflow). If empty, a new site is created instead."

jobs:
  test-existing-site:
    if: ${{ inputs.instawp_url != '' }}
    uses: krokedil/krokedil-wp-ci/.github/workflows/deploy-plugin-dev-zip-instawp-existing.yml@develop-tests
    with:
      use_fixture_plugin: true
      instawp_url: ${{ inputs.instawp_url }}
    secrets:
      INSTAWP_API_TOKEN: ${{ secrets.INSTAWP_API_TOKEN }}

  test-new-site:
    if: ${{ inputs.instawp_url == '' }}
    uses: krokedil/krokedil-wp-ci/.github/workflows/deploy-plugin-dev-zip-instawp-new.yml@develop-tests
    with:
      use_fixture_plugin: true
    secrets:
      INSTAWP_API_TOKEN: ${{ secrets.INSTAWP_API_TOKEN }}
      E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
      E2E_API_SECRET: ${{ secrets.E2E_API_SECRET }}
