name: Deploy Plugin Dev Zip to New InstaWP Site
permissions:
  contents: read
on:
  workflow_call:
    inputs:
      instawp_url:
        required: false
        type: string
        default: ""
        description: "Desired site name for the new InstaWP site (e.g. my-plugin-test). Auto-generated if omitted."
    secrets:
      INSTAWP_API_TOKEN:
        required: true
      E2E_API_KEY:
        required: false
      E2E_API_SECRET:
        required: false
    outputs:
      instawp_site_id:
        description: "InstaWP site ID of the newly created site."
        value: ${{ jobs.deploy.outputs.instawp_site_id }}
      instawp_site_url:
        description: "URL of the newly created InstaWP site."
        value: ${{ jobs.deploy.outputs.instawp_site_url }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      INSTAWP_TOKEN: ${{ secrets.INSTAWP_API_TOKEN }}
    outputs:
      instawp_site_id: ${{ steps.create-site.outputs.site_id }}
      instawp_site_url: ${{ steps.create-site.outputs.site_url }}

    steps:
      - name: Checkout plugin repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 1

      - name: Checkout CI helpers
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: krokedil/krokedil-wp-ci
          path: .github/krokedil-wp-ci
          ref: develop-tests
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .github/krokedil-wp-ci/.nvmrc

      - name: Install CI helper dependencies
        working-directory: .github/krokedil-wp-ci
        run: npm ci

      - name: Install InstaWP CLI
        run: npm install -g @instawp/cli@0.0.1-beta.2

      - name: Get plugin meta
        id: meta
        run: bash .github/krokedil-wp-ci/scripts/get-plugin-meta.sh

      - name: Prepare plugin dev zip
        id: prepare
        env:
          PLUGIN_SLUG: ${{ steps.meta.outputs.plugin_slug }}
          DISTRIBUTION_PLATFORM: ${{ steps.meta.outputs.distribution_platform }}
        run: bash .github/krokedil-wp-ci/scripts/prepare-plugin-dev-zip.sh

      # For WordPress.org plugins, prepare-plugin-dev-zip.sh does not create
      # zipfile/ (it relies on the wp.org build action). Create it here instead
      # so the sync step has a consistent source regardless of distribution type.
      - name: Create plugin directory for sync (WordPress.org plugins)
        if: steps.meta.outputs.distribution_platform == 'wordpress-org'
        env:
          PLUGIN_SLUG: ${{ steps.meta.outputs.plugin_slug }}
        run: |
          mkdir -p "zipfile/${PLUGIN_SLUG}"
          rsync -av --exclude='zipfile' . "zipfile/${PLUGIN_SLUG}/"

      - name: Create InstaWP site
        id: create-site
        env:
          INSTAWP_URL: ${{ inputs.instawp_url }}
        run: |
          # --name is required by the CLI; fall back to ci-<run-id> if not provided.
          SITE_NAME="${INSTAWP_URL:-ci-${GITHUB_RUN_ID}}"
          SITE_JSON=$(instawp sites create --name "$SITE_NAME" --json)
          SITE_ID=$(echo "$SITE_JSON" | jq -r '.data.id')
          SITE_URL=$(echo "$SITE_JSON" | jq -r '.data.url')
          echo "site_id=${SITE_ID}" >> "$GITHUB_OUTPUT"
          echo "site_url=${SITE_URL}" >> "$GITHUB_OUTPUT"

      - name: Upload plugin files to InstaWP site
        env:
          PLUGIN_SLUG: ${{ steps.meta.outputs.plugin_slug }}
          INSTAWP_SITE_ID: ${{ steps.create-site.outputs.site_id }}
        run: |
          # Arrange plugin files into wp-content structure expected by instawp sync push.
          mkdir -p wp-content/plugins
          cp -r "zipfile/${PLUGIN_SLUG}" "wp-content/plugins/${PLUGIN_SLUG}"

          # Sync the plugin directory directly to the site via rsync.
          # Activation happens after the WC blueprint so WooCommerce is already installed.
          instawp sync push "$INSTAWP_SITE_ID"

      - name: Generate unified blueprint
        env:
          PLUGIN_META_FILE: .github/plugin-meta.json
          BLUEPRINT_OUTPUT_PATH: /tmp/generated-blueprint.json
          KCO_TEST_MERCHANT_ID_EU: ${{ secrets.KCO_TEST_MERCHANT_ID_EU }}
          KCO_TEST_SHARED_SECRET_EU: ${{ secrets.KCO_TEST_SHARED_SECRET_EU }}
        run: |
          node .github/krokedil-wp-ci/scripts/instawp/generate-blueprint.js

      - name: Apply blueprint to InstaWP site
        env:
          INSTAWP_SITE_ID: ${{ steps.create-site.outputs.site_id }}
        run: |
          BLUEPRINT_B64=$(base64 -w 0 /tmp/generated-blueprint.json)
          SCRIPT_B64=$(base64 -w 0 .github/krokedil-wp-ci/scripts/instawp/apply-blueprint.sh)
          instawp exec "$INSTAWP_SITE_ID" \
            "printf '%s' '${BLUEPRINT_B64}' | base64 -d > /tmp/generated-blueprint.json && printf '%s' '${SCRIPT_B64}' | base64 -d > /tmp/apply-blueprint.sh && BLUEPRINT_JSON_PATH=/tmp/generated-blueprint.json bash /tmp/apply-blueprint.sh"

      - name: Activate plugin
        env:
          PLUGIN_SLUG: ${{ steps.meta.outputs.plugin_slug }}
          INSTAWP_SITE_ID: ${{ steps.create-site.outputs.site_id }}
        run: |
          instawp wp "$INSTAWP_SITE_ID" plugin activate "$PLUGIN_SLUG"

      - name: Add InstaWP deploy job summary
        env:
          INSTAWP_SITE_URL: ${{ steps.create-site.outputs.site_url }}
          INSTAWP_SITE_ID: ${{ steps.create-site.outputs.site_id }}
          INSTAWP_SITE_CREATED: "true"
        run: |
          node .github/krokedil-wp-ci/scripts/job-summary-deploy-plugin-dev-zip-instawp.js
