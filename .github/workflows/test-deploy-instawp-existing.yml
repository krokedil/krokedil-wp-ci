name: "Test: Deploy to Existing InstaWP Site"
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      instawp_url:
        required: true
        type: string
        description: "URL of the existing InstaWP site to deploy to (e.g. qliro-sandbox.krokedil.site). Fails if the site is not found."

jobs:
  test:
    uses: krokedil/krokedil-wp-ci/.github/workflows/deploy-plugin-dev-zip-instawp-existing.yml@develop-tests
    with:
      use_fixture_plugin: true
      instawp_url: ${{ inputs.instawp_url }}
    secrets:
      INSTAWP_API_TOKEN: ${{ secrets.INSTAWP_API_TOKEN }}
