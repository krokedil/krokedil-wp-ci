# Use this workflow for external plugins where Krokedil has no fork.
# S3 upload is disabled since no AWS credentials are available in this repo.
# The dev zip and test report are uploaded as GitHub artifacts and must be
# downloaded from the workflow run page in GitHub Actions.
name: Create Plugin Dev Zip (external repo)

on:
  # Uncomment the push on any commit below to test the action easily.
  # push:
  #   branches:
  #     - '**'
  workflow_dispatch:
    inputs:
      test_php_versions:
        required: false
        type: string
        default: "8.3"
        description: "PHP versions used for basic testing of the plugin dev zip: 8.4,8.3,8.2,8.1,8.0,7.4 (comma-separated) or 'all'."

jobs:
  build:
    uses: krokedil/krokedil-wp-ci/.github/workflows/create-plugin-dev-zip.yml@v1
    with:
      aws_upload: false
      test_php_versions: ${{ inputs.test_php_versions }}
