name: Deploy Plugin Dev Zip to InstaWP

on:
  workflow_dispatch:
    inputs:
      instawp_url:
        required: false
        type: string
        default: ""
        description: "InstaWP site URL to deploy to an existing site (e.g. qliro-sandbox.krokedil.site). If empty, a new site is created."

jobs:
  deploy-existing:
    if: ${{ inputs.instawp_url != '' }}
    uses: krokedil/krokedil-wp-ci/.github/workflows/deploy-plugin-dev-zip-instawp-existing.yml@v1
    with:
      instawp_url: ${{ inputs.instawp_url }}
    secrets:
      INSTAWP_API_TOKEN: ${{ secrets.INSTAWP_API_TOKEN }}

  deploy-new:
    if: ${{ inputs.instawp_url == '' }}
    uses: krokedil/krokedil-wp-ci/.github/workflows/deploy-plugin-dev-zip-instawp-new.yml@v1
    secrets:
      INSTAWP_API_TOKEN: ${{ secrets.INSTAWP_API_TOKEN }}
      E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
      E2E_API_SECRET: ${{ secrets.E2E_API_SECRET }}
